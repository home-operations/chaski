suite: deployment
templates:
  - templates/deployment.tpl
  - templates/configmap.tpl
release:
  name: chaski
  namespace: chaski
tests:
  - it: is a Deployment with a RollingUpdate strategy by default
    template: templates/deployment.tpl
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.strategy.type
          value: RollingUpdate

  - it: wires the core CHASKI_* env
    template: templates/deployment.tpl
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CHASKI_PORT
            value: "8080"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CHASKI_CONFIG
            value: /config/chaski.yaml

  - it: mounts the config and stamps a config checksum
    template: templates/deployment.tpl
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config
            mountPath: /config
            readOnly: true
      - exists:
          path: spec.template.metadata.annotations["checksum/config"]

  - it: has no token env by default but adds it from the chart Secret when set
    template: templates/deployment.tpl
    set:
      auth.webhookToken: s3cr3t
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CHASKI_WEBHOOK_TOKEN
            valueFrom:
              secretKeyRef:
                name: chaski
                key: token

  - it: sources the token from an existing Secret when given
    template: templates/deployment.tpl
    set:
      auth.existingSecret: my-secret
      auth.existingSecretKey: webhook
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CHASKI_WEBHOOK_TOKEN
            valueFrom:
              secretKeyRef:
                name: my-secret
                key: webhook

  - it: omits SMTP env and port by default
    template: templates/deployment.tpl
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: CHASKI_SMTP_ENABLED
            value: "true"
      - notContains:
          path: spec.template.spec.containers[0].ports
          content:
            name: smtp
            containerPort: 8025
            protocol: TCP

  - it: wires SMTP env, port, and auth Secret when enabled
    template: templates/deployment.tpl
    set:
      config.smtpEnabled: true
      auth.smtpAuth: "alice:secret"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CHASKI_SMTP_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CHASKI_SMTP_AUTH
            valueFrom:
              secretKeyRef:
                name: chaski
                key: smtpAuth
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: smtp
            containerPort: 8025
            protocol: TCP

  # Pins the port standard: probes target /healthz and /readyz on the http
  # port, and disabling metrics removes the metrics containerPort without
  # touching them — the pod stays Ready.
  - it: targets health probes at the http port and survives metrics-off
    template: deployment.tpl
    set:
      config.metricsEnabled: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].ports
          content:
            name: metrics
            containerPort: 8081
            protocol: TCP
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: http
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /healthz
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: http
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /readyz
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.port
          value: http
