suite: serviceaccount
templates:
  - templates/serviceaccount.tpl
release:
  name: chaski
  namespace: chaski
tests:
  - it: is created with the API token unmounted by default
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: is not rendered when create is false
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0
