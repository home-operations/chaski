suite: configmap
templates:
  - templates/configmap.tpl
release:
  name: chaski
  namespace: chaski
tests:
  - it: renders routes/targets/templates verbatim (chaski template syntax is not evaluated)
    set:
      config:
        routes:
          alertmanager:
            target: po
            title: '{{ template "label" . }} {{ .payload.commonLabels.alertname }}'
        targets:
          po:
            apprise:
              url: "pover://u@t/"
        templates:
          label: "[{{ .payload.severity }}]"
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data["chaski.yaml"]
          pattern: "alertmanager"
      - matchRegex:
          path: data["chaski.yaml"]
          pattern: '\.payload\.commonLabels\.alertname'
      - matchRegex:
          path: data["chaski.yaml"]
          pattern: "templates:"
      - matchRegex:
          path: data["chaski.yaml"]
          pattern: 'template "label"'

  - it: is suppressed when an existing ConfigMap is supplied
    set:
      config.existingConfigMap: my-routes
    asserts:
      - hasDocuments:
          count: 0
