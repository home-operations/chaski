suite: service
templates:
  - templates/service.tpl
release:
  name: chaski
  namespace: chaski
tests:
  - it: exposes the http and metrics ports
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 8080
            targetPort: http
            protocol: TCP
      - contains:
          path: spec.ports
          content:
            name: metrics
            port: 8081
            targetPort: metrics
            protocol: TCP

  - it: drops the metrics port when metrics are disabled
    set:
      config.metricsEnabled: false
    asserts:
      - notContains:
          path: spec.ports
          content:
            name: metrics
            port: 8081
            targetPort: metrics
            protocol: TCP
