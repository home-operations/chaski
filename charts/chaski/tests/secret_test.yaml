suite: secret
templates:
  - templates/secret.tpl
release:
  name: chaski
  namespace: chaski
tests:
  - it: is not rendered by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders the token Secret when webhookToken is set
    set:
      auth.webhookToken: s3cr3t
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.token
          value: s3cr3t

  - it: is not rendered when an existing Secret is used
    set:
      auth.webhookToken: s3cr3t
      auth.existingSecret: external
    asserts:
      - hasDocuments:
          count: 0

  - it: renders the smtpAuth key when smtpAuth is set
    set:
      auth.smtpAuth: "alice:secret,bob:hunter2"
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.smtpAuth
          value: "alice:secret,bob:hunter2"
